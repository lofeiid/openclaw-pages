<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenClaw Pages Smoke Test</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f2ea;
      --ink: #1f1c18;
      --accent: #c85a2e;
      --card: rgba(255, 255, 255, 0.82);
      --border: rgba(31, 28, 24, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(200, 90, 46, 0.18), transparent 32%),
        linear-gradient(135deg, #f8f5ef, var(--bg));
    }

    main {
      width: min(680px, calc(100vw - 32px));
      padding: 40px 36px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--card);
      box-shadow: 0 24px 64px rgba(31, 28, 24, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1;
    }

    p {
      margin: 0 0 14px;
      font-size: 1.05rem;
      line-height: 1.6;
    }

    code {
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(200, 90, 46, 0.1);
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <p><code>GitHub Pages smoke test</code></p>
    <h1>OpenClaw publish path is live.</h1>
    <p>This file was generated locally and pushed through the new GitHub Pages publisher.</p>
    <p>Timestamp marker: 2026-03-18.</p>
  </main>
</body>
</html>
